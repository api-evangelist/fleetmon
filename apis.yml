name: FleetMon
kind: company
description: FleetMon was a Rostock, Germany based vessel tracking and maritime data
  provider (founded 2007) that operated one of the world's largest terrestrial AIS
  receiver networks and a documented REST API (apiv2.fleetmon.com) for vessel search,
  live and historical AIS positions, port calls, expected arrivals, ETA and voyage
  planning. Kpler acquired FleetMon alongside MarineTraffic in 2023, the FleetMon
  platform and API were phased out from January 2024 and migrated into MarineTraffic,
  and in September 2025 the combined AIS assets were unified under the Kpler AIS
  brand. As of 2026 the fleetmon.com domain, developer portal, and API no longer
  resolve - this entry preserves the final archived API surface and points to the
  Kpler / MarineTraffic successor services.
