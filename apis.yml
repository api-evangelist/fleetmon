  - url: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
    type: ArchivedAPIReference
  - url: openapi/fleetmon-openapi.yml
    type: OpenAPI
  description: 'Retired. Vessel master data surface of the FleetMon API - search
    the vessel database (GET /vesselsearch/), fetch basic and extended vessel
    particulars (GET /basicvessel/{vessel_id}, GET /vessel/{vessel_id}), vessel
    identity attributes, non-AIS vessel particulars, vessel photos, and manage
    tracked fleets (GET/POST/PUT/DELETE /fleet/). Authenticated with an API key
    via apikey query parameter or Api-Key header. Endpoints are grounded in the
    archived Swagger 2.0 definition but are no longer live - the surface migrated
    to MarineTraffic / Kpler AIS.'
- aid: fleetmon:fleetmon-vessel-positions-api
  name: FleetMon Vessel Positions API (Retired)
  tags:
  - AIS
  - Positions
  - Vessel Tracking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
  baseURL: https://apiv2.fleetmon.com
  properties:
  - url: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
    type: ArchivedAPIReference
  - url: openapi/fleetmon-openapi.yml
    type: OpenAPI
  description: 'Retired. AIS position tracking surface of the FleetMon API - latest
    vessel position (GET /vessel/{vessel_id}/position/), positions with extended
    vessel data for your fleet (GET /myfleet/), historical AIS track reports
    (GET /ais/position/), historical AIS static and voyage messages (GET /ais/static/),
    dynamic AIS data, vessels inside a bounding box (GET /regional_ais/), and
    vessels near a position (GET /vessel/near/). Endpoints are grounded in the
    archived Swagger 2.0 definition but are no longer live - live AIS feeds now
    ship as Kpler AIS via the MarineTraffic API portfolio.'
- aid: fleetmon:fleetmon-port-calls-eta-api
  name: FleetMon Port Calls & ETA API (Retired)
  tags:
  - Port Calls
  - Ports
  - ETA
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
  baseURL: https://apiv2.fleetmon.com
  properties:
  - url: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
    type: ArchivedAPIReference
  - url: openapi/fleetmon-openapi.yml
    type: OpenAPI
  description: 'Retired. Port intelligence surface of the FleetMon API - port
    search (GET /portsearch/), port calls per port and per vessel (GET /port/portcalls/,
    GET /vessel/portcalls/), vessels currently in port (GET /port/inport/), expected
    port arrivals (GET /port/arrivals/), next port and ETA calculation
    (GET /vessel/{vessel_id}/ports/next/), distance to port, voyage planning ETA
    and distance estimations (POST /voyage-planning/), and zone monitoring calls.
    Endpoints are grounded in the archived Swagger 2.0 definition but are no
    longer live - the surface migrated to MarineTraffic / Kpler AIS.'
