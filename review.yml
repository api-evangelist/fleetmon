aid: fleetmon
name: FleetMon
review:
  question: Does FleetMon expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. The FleetMon API (apiv2.fleetmon.com)
    was plain request/response REST over HTTPS authenticated with an API key -
    the final archived Swagger 2.0 definition (v2.4.2) documents no WebSocket,
    SSE, or any other server-push transport. There is therefore nothing to
    model in AsyncAPI. Moreover the entire API is retired: FleetMon was
    acquired by Kpler in 2023, the platform and API were phased out from
    January 2024 into MarineTraffic, and as of 2026 the fleetmon.com domain
    no longer resolves at all.
findings:
  summary: |
    FleetMon never documented a public WebSocket API, and today it exposes no
    public API at all. FleetMon was a Rostock, Germany vessel tracking and AIS
    data provider whose REST API at https://apiv2.fleetmon.com (Swagger 2.0,
    final archived version 2.4.2) covered vessel search, basic and extended
    vessel data, latest and historical AIS positions, regional AIS bounding-box
    queries, port calls, expected arrivals, next-port/ETA calculation, voyage
    planning, distance to port, weather/wave data, fleets, and zone monitoring.
    Authentication was an API key passed as an apikey query parameter, an
    Api-Key header, or an Authorization Token header; responses carried a
    request_limit_info block reporting credit/rate consumption. Every transport
    in the archived definition is HTTPS request/response - no ws:// or wss://
    endpoint appears anywhere. Kpler acquired FleetMon (alongside MarineTraffic)
    in 2023; the FleetMon platform was phased out from January 2024, the
    developer portal carried a termination notice through its final archived
    capture (January 2025), and in September 2025 the combined AIS assets
    relaunched as Kpler AIS. As of this review, fleetmon.com, www.fleetmon.com,
    developer.fleetmon.com, apidocs.fleetmon.com, and apiv2.fleetmon.com return
    no DNS A records - the domain is dark and the API surface is fully retired.
  retirementStatus: |
    RETIRED. The archived developer portal (January 2025 capture) states the
    migration of FleetMon into MarineTraffic was nearly final, that "the
    discontinuation of all FleetMon product offerings is imminent," and that
    logins were no longer possible. Account logins had already been
    discontinued in February 2024. The successor surface for vessel tracking,
    AIS positions, and port call data is the MarineTraffic API portfolio
    (servicedocs.marinetraffic.com), whose position feeds were rebranded
    Kpler AIS on September 19, 2025.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://apiv2.fleetmon.com
      documented: true
      note: Archived Swagger 2.0 definition (v2.4.2), API-key auth via apikey query parameter, Api-Key header, or Authorization Token header. Retired - host no longer resolves.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint appears anywhere in the archived FleetMon API definition or developer portal, and no live surface exists today to expose one.
