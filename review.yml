  endpointsModeled: false
  endpointsNote: |
    Endpoints above are not modeled - they are taken verbatim from the final
    archived Swagger 2.0 schema (apiv2.fleetmon.com/schema.json, Wayback
    Machine capture 2021-12-08), preserved in this repository at
    openapi/fleetmon-openapi.yml. None are live today.
sources:
  - url: http://web.archive.org/web/20211208160310/https://apiv2.fleetmon.com/schema.json
    type: OpenAPI
    note: Final archived Swagger 2.0 schema (v2.4.2) for the FleetMon API - REST only, API-key auth, no WebSocket.
  - url: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
    type: ArchivedAPIReference
    note: Archived Redoc API reference on developer.fleetmon.com, final capture January 2025.
  - url: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/
    type: ArchivedDeveloperPortal
    note: January 2025 capture carries the termination notice - discontinuation of all FleetMon product offerings imminent, logins disabled.
  - url: https://www.kpler.com/blog/kpler-acquires-marinetraffic-and-fleetmon-for-maritime-sector-expansion
    type: Announcement
    note: Kpler acquisition of MarineTraffic and FleetMon, announced February 15, 2023.
  - url: https://support.marinetraffic.com/en/articles/9552991-fleetmon-and-marinetraffic-merge-process-for-former-fleetmon-ais-partners-from-january-2024
    type: MigrationGuide
    note: FleetMon phased out from January 2024 as part of the merger into MarineTraffic.
  - url: https://support.marinetraffic.com/en/articles/12495052-19-september-2025-announcing-the-launch-of-kpler-ais
    type: Announcement
    note: Kpler AIS launch, September 19, 2025 - unified successor brand for the combined AIS feeds.
  - url: https://servicedocs.marinetraffic.com/
    type: Documentation
    note: Live successor API documentation (MarineTraffic API portfolio under Kpler).
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface ever existed on the FleetMon API, and the
    API itself is retired with its domain dark, so no AsyncAPI document was
    created. The final archived Swagger 2.0 definition was preserved at
    openapi/fleetmon-openapi.yml and the apis.yml documents the retired
    surface plus the Kpler / MarineTraffic successor properties.
