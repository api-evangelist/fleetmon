info:
  description: 'ARCHIVED SPECIFICATION - RETIRED API. This is the final publicly archived Swagger 2.0
    definition of the FleetMon API (apiv2.fleetmon.com), preserved from the Internet Archive Wayback Machine
    (schema.json capture 2021-12-08; the developer portal at developer.fleetmon.com remained online through
    early 2025). FleetMon was acquired by Kpler in 2023, the FleetMon platform and API were phased out
    beginning January 2024 and migrated into MarineTraffic, and as of 2026 the fleetmon.com domain (including
    apiv2.fleetmon.com and developer.fleetmon.com) no longer resolves. None of the endpoints below are
    live. The successor surface is the MarineTraffic API portfolio / Kpler AIS (servicedocs.marinetraffic.com).


    --- Original description follows ---


    Welcome to our API reference!


    You can view JSON response samples in the area to the right.

    If you need help with the API, just [contact us](https://www.fleetmon.com/company/contact/).


    Follow us on [Facebook](https://www.facebook.com/fleetmon) and [Twitter](https://twitter.com/fleetmon)
    for the latest updates and news on the platform.


    With the use of the FleetMon API, you agree with the [Terms of Service](https://www.fleetmon.com/terms-of-service/).

    '
  title: FleetMon API Reference
  version: Version 2.4.2
  x-archived:
    status: retired
    retiredNote: FleetMon product offerings, logins, and the apiv2.fleetmon.com API were discontinued
      during the 2024 migration into MarineTraffic following the 2023 Kpler acquisition; fleetmon.com
      DNS no longer resolves as of 2026.
    archiveSource: http://web.archive.org/web/20211208160310/https://apiv2.fleetmon.com/schema.json
    archivedDeveloperPortal: http://web.archive.org/web/20250106234623/https://developer.fleetmon.com/reference/
    successor: https://servicedocs.marinetraffic.com/
    archivedBy: API Evangelist
    archivedDate: '2026-07-11'
paths:
  /ais/position/:
    get:
      description: ''
      operationId: get-ais_position-listing
      parameters:
      - description: start time for track
        format: date-time
        in: query
        name: from
        required: false
        type: string
      - description: maximum number of messages to return
        format: int64
        in: query
        name: limit
        required: false
        type: integer
      - description: MMSI number
        format: int64
        in: query
        name: mmsi
        required: true
        type: integer
      - default: false
        description: If `true` some extra attributes will be added to the response informing about usage
          and limits of this endpoint.
        in: query
        name: request_limit_info
        required: false
        type: boolean
      - default: asc
        description: sorting of items
        enum:
        - asc
        - desc
        format: ascii
        in: query
        name: sort
        required: false
        type: string
      - description: resolution of track in seconds
        format: int64
        in: query
        name: time_res
        required: false
        type: integer
      - description: end time for track
        format: date-time
        in: query
        name: until
        required: false
        type: string
      responses:
        '200':
          description: Historical Track API - get ais position items response
          schema:
            $ref: '#/definitions/ais_position-response'
        '401':
          description: The server could not verify that you are authorized to access the URL.
          schema:
            allOf:
            - $ref: '#/definitions/error-message-response'
            - title: response-status-401
            xml:
              name: response
              namespace: https://apiv2.fleetmon.com
              x-extra-attributes:
                timestamp:
                  type: date-time
          x-example-object:
            code: 401
            description: The server could not verify that you are authorized to access the URL requested.
            message: Unauthorized
            status: error
        '403':
          description: The provided credentials were correct but the API is not yet fully configured.
          schema:
            allOf:
            - $ref: '#/definitions/error-message-response'
            - title: response-status-403
            xml:
